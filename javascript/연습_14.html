<html>
	<head>
		<title>연습 14</title>
		<script>
			var money = 50000;
			var class1 = Number(prompt("초딩:1,중딩:2,고딩:3"));
			if(class1 == 1){
				money += 10000;
			} else if(class1 == 2){
				money += 20000;
			} else if(class1 == 3){
				money += 50000;
			} else{
				money = 0;
			}
			document.write("용돈은 " + money + "원 입니다.");
		</script>
	</head>
	<body>
	</body>
</html>
