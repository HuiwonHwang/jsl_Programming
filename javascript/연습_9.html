<html>
	<head>
		<title>연습 9</title>
		<script>
			var score = prompt("몇점?");
			if(Number(score) > 80){
				document.write("합격<br>");
			} else {
				document.write("불합격<br>");
			}
			
			var result = "";
			if(Number(score) > 80){
				result = "합격";
			} else {
				result = "불합격";
			}
			document.write(result+"<br>");
			//if문을 써도 되고 변수를 하나 더 만들어서 출력문에 넣어도 된다.
			
		</script>
	</head>
	<body>
		
	</body>
</html>
