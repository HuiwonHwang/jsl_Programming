<html>
	<head>
		<title>practice 25</title>
		<script>
			var score = [50,60,70,80,90,100];
			var member = ["황희원","김견강","오현민","홍길동","김길동","박길동",]
			for(k=0;k<member.length;k++){
				document.write(member[k]+"<br>");
			}
			var total = 0;
			for(i=0;i<score.length;i++){
				document.write((i+1)+" score is "+score[i]+"<br>");
				total += score[i];
			}
			document.write("total score: "+total);
		</script>
	</head>
</html>
