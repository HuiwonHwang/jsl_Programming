<html>
	<head>
		<title>star</title>
		<script>
	
			
			var line = Number(prompt("how many line"));
			var star = 1;
			var space = line - 1;

			for(i=0;i<line;i++){
				for(k=1;k<=space;k++){
					document.write(" ");
				}
				for(z=1;z<=star;z++){
					document.write("*");
				}	
				document.write("<br>");
				star += 2;
				space--;
			}
			
		</script>
	</head>
	<body>
	</body>
</html>
