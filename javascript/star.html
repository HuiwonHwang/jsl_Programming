<html>
	<head>
		<title>star</title>
		<script>
			
			var space = 5;
			for(i=1;i<=5;i++){	
				for(k=0;k<i;k++){
					if(space - i > 2){
						document.write(" ");
					}
					if(i%2!=0){
						document.write("*");
					} 
				}
				if(i%2!=0){
				document.write("<br>");
				}
			}
			
			
		</script>
	</head>
	<body>
	</body>
</html>
