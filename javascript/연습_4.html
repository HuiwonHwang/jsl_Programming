<html>
	<head>
		<title>연습 4</title>
		<script>
			var a = 5;
			var b = 5;
			var result = a > b;
			// a=5,b=5면 a > b 로 하면 false가 나온다.
			document.write("result1: " + result + "<br>");
			
			var result = a < b;
			document.write("result2: "+ result + "<br>");
			
			var result = a == b;
			//같다 부등호는 ==, 같지 않다 부등호는 != 
			document.write("result3: " + result + "<br>");
			
			var result = a != b;
			document.write("result4: " + result + "<br>");
			
			var result = a >= b;
			document.write("result5: " + result + "<br>");
			
			var result = a <= b;
			document.write("result6: " + result + "<br>");
			
			var name = "홍길동";
			var str = "홍길동";
			//문자열 내에 스페이스바 하나만 있어도 다른 취급
			var result = name == str;
			document.write("result7: " + result + "<br>");
			
		</script>
	</head>
	<body>
	
	</body>
</html>
