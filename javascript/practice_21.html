<html>
	<head>
		<title>practice 21</title>
		<script>
			/*5번 성적 입력 
			80이상 합격 몇명
			80이하 불합격 몇명인지
			
			출력 합격   0명
				불합격 0명*/
			
			var value = 0;;
			var passed = 0;
			var failed = 0;
			for(i=1;i<=5;i++){
				value = Number(prompt(i+"번째 성적"))
				if(value >= 80){
					passed++;
				} else {
					failed++;
				}
			}
			document.write("passed: "+passed+"<br>failed: "+failed);
		</script>
	</head>
	<body>
	</body>
</html>
