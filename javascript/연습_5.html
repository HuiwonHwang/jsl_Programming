<html>
	<head>
	<title>연습 5</title>
	<script>
		var a = 10;
		a = a + 10;
		a += 10;
		//+=는 변수 자신에게 값을 더하는 것의 약칭이다.
		document.write("a: " + a + "<br>");
		
		var b = 10;
		b = b - 10;
		b -= 10;
		document.write("b: "+ b + "<br>");
		
		var c = 10;
		c = c * 5;
		c *= 5;
		document.write("c: "+ c + "<br>");
		
		var d = 10;
		d /=5;
		document.write("d: " + d + "<br>");
		
		var e = 1;
		e += 1;
		e++;
		document.write("e: " + e + "<br>");
		
		var str = "저는 ";
		str = str + "대전에";
		str += " 있습니다.";
		document.write("str: "+str+ "<br>");
		
		
		
	</script>
	</head>
	<body>
		
	</body>
</html>
