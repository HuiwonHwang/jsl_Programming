<html>
	<head>
		<title>연습 7</title>
		<script>
			var name = prompt("성 명?");
			document.write("너의 이름은 " + name + "<br>");
			
			/*parseInt(prompt("수학 성적은?"),10);로도 정수형으로 만들 수 있고
			 Number()로 기본으로 쓸 수 있다.     
			*/
			var kor = prompt("국어 성적은?");
			document.write("너의 국어 성적은 " + kor + "<br>");
			var eng = prompt("영어 성적은?");
			document.write("너의 영어 성적은 " + eng + "<br>");
			var mat = prompt("수학 성적은?");
			document.write("너의 수학 성적은 " + mat + "<br>");
			var total = Number(kor) + Number(eng) + Number(mat);
			document.write("총점은 " + total + "<br>");
			
		</script>
	</head>
	<body>
		
	</body>
</html>
